<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>จองคิวรับบริการ | E-Complaint</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      /* ================= ลูกเล่นหน้าจองคิว (Wizard Form & Staff Cards) ================= */
      .booking-card {
        background: #fff;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.04);
        border: 1px solid #f0f4f8;
        position: relative;
        overflow: hidden;
      }

      .wizard-progress {
        display: flex;
        justify-content: space-between;
        position: relative;
        margin-bottom: 40px;
        padding: 0 20px;
      }
      .wizard-progress::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 30px;
        right: 30px;
        height: 4px;
        background: #f0f4f8;
        transform: translateY(-50%);
        z-index: 1;
        border-radius: 2px;
      }
      .progress-line {
        position: absolute;
        top: 50%;
        left: 30px;
        height: 4px;
        background: #ff66a3;
        transform: translateY(-50%);
        z-index: 2;
        transition: width 0.4s ease;
        border-radius: 2px;
        width: 0%;
      }
      .step-indicator {
        width: 40px;
        height: 40px;
        background: #fff;
        border: 4px solid #f0f4f8;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        color: #ccc;
        position: relative;
        z-index: 3;
        transition: all 0.4s ease;
      }
      .step-indicator.active {
        border-color: #ff66a3;
        color: #ff66a3;
        box-shadow: 0 0 0 5px rgba(255, 102, 163, 0.1);
      }
      .step-indicator.completed {
        background: #ff66a3;
        border-color: #ff66a3;
        color: #fff;
      }
      .step-label {
        position: absolute;
        bottom: -25px;
        font-size: 12px;
        color: #888;
        white-space: nowrap;
        font-weight: 600;
      }

      .form-step {
        display: none;
        animation: fadeInRight 0.4s ease forwards;
      }
      .form-step.active {
        display: block;
      }
      @keyframes fadeInRight {
        0% {
          opacity: 0;
          transform: translateX(30px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .wizard-buttons {
        display: flex;
        justify-content: space-between;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 2px dashed #f0f4f8;
      }
      .btn-prev {
        background: #f8f9fa;
        color: #555;
        border: none;
        padding: 12px 25px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-prev:hover {
        background: #e1e5eb;
      }
      .btn-next {
        background: #ff66a3;
        color: #fff;
        border: none;
        padding: 12px 30px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 5px 15px rgba(255, 102, 163, 0.3);
      }
      .btn-next:hover {
        background: #e64d8a;
        transform: translateY(-2px);
      }

      .summary-box {
        background: #fff0f5;
        border: 1px dashed #ffb3d1;
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 20px;
      }
      .summary-item {
        display: flex;
        margin-bottom: 10px;
        font-size: 14px;
      }
      .summary-item i {
        width: 25px;
        color: #ff66a3;
      }
      .summary-item strong {
        color: #333;
        margin-left: 5px;
      }

      /* การ์ดเลือกเจ้าหน้าที่ */
      .staff-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
        margin-top: 15px;
      }
      .staff-card {
        background: #fff;
        border: 2px solid #e1e5eb;
        border-radius: 16px;
        padding: 20px 15px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        opacity: 0;
        animation: fadeInUp 0.4s ease forwards;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100%;
      }
      .staff-card:hover {
        border-color: #ffb3d1;
        transform: translateY(-5px);
        box-shadow: 0 12px 25px rgba(255, 102, 163, 0.12);
      }
      .staff-card.selected {
        border-color: #ff66a3;
        background: #fff0f5;
        box-shadow: 0 5px 15px rgba(255, 102, 163, 0.2);
        transform: translateY(-2px);
      }

      .staff-img {
        width: 85px;
        height: 85px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        background: #f4f7fb;
        padding: 4px;
        border: 3px solid transparent;
        transition: 0.3s;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
      .staff-card.selected .staff-img {
        border-color: #ff66a3;
        background: #fff;
        box-shadow: 0 4px 15px rgba(255, 102, 163, 0.3);
      }

      .staff-name {
        font-size: 15px;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 5px;
      }
      .staff-role {
        font-size: 12px;
        color: #888;
        line-height: 1.4;
        margin-top: auto;
      }

      @keyframes fadeInUp {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="page-body">
    <nav class="navbar">
      <div class="logo">
        <i class="fa-solid fa-calendar-check"></i> E-Complaint
        <span>Booking</span>
      </div>
      <div class="nav-menu">
        <button onclick="window.location.href = 'home.html'" class="logout-btn">
          <i class="fa-solid fa-house"></i> ยกเลิกและกลับ
        </button>
      </div>
    </nav>

    <div class="booking-wrapper">
      <div class="booking-card">
        <h2 class="text-center" style="margin-bottom: 10px; color: #1a1a1a">
          นัดหมายรับบริการ
        </h2>

        <div class="wizard-progress">
          <div class="progress-line" id="progressLine"></div>
          <div class="step-indicator active" id="ind-1">
            1 <span class="step-label">บริการ</span>
          </div>
          <div class="step-indicator" id="ind-2">
            2 <span class="step-label">วัน & เวลา</span>
          </div>
          <div class="step-indicator" id="ind-3">
            3 <span class="step-label">ผู้ติดต่อ</span>
          </div>
        </div>

        <form id="bkForm">
          <!-- Step 1: เลือกบริการและสถานที่ -->
          <div class="form-step active" id="step-1">
            <h3
              style="
                margin-bottom: 20px;
                border-bottom: 1px solid #eee;
                padding-bottom: 10px;
              "
            >
              <i class="fa-solid fa-layer-group" style="color: #ff66a3"></i> 1.
              เลือกบริการและสถานที่
            </h3>

            <div class="input-group">
              <label for="sType">บริการที่ต้องการติดต่อ</label>
              <select id="sType" class="form-control" required>
                <option value="" disabled selected>
                  กำลังโหลดข้อมูลบริการ...
                </option>
              </select>
            </div>

            <div class="input-group">
              <label
                ><i class="fa-solid fa-user-tie" style="color: #ff66a3"></i>
                เจ้าหน้าที่ผู้ให้บริการ</label
              >
              <div id="staff-grid" class="staff-grid">
                <div
                  style="
                    grid-column: 1/-1;
                    text-align: center;
                    color: #888;
                    padding: 20px;
                  "
                >
                  <i class="fa-solid fa-spinner fa-spin"></i>
                  กำลังโหลดรายชื่อเจ้าหน้าที่...
                </div>
              </div>
              <input type="hidden" id="staff" required />
            </div>

            <div class="input-group" style="margin-bottom: 0">
              <label for="loc">สาขา/สถานที่ติดต่อ</label>
              <select id="loc" class="form-control" required>
                <option value="" disabled selected>
                  -- กรุณาเลือกสถานที่ --
                </option>
                <option value="ศูนย์ราชการ อาคาร A (สำนักงานใหญ่)">
                  ศูนย์ราชการ อาคาร A (สำนักงานใหญ่)
                </option>
                <option value="ศูนย์บริการประชาชน สาขาย่อย B">
                  ศูนย์บริการประชาชน สาขาย่อย B
                </option>
                <option value="จุดบริการเคลื่อนที่ (Mobile Unit)">
                  จุดบริการเคลื่อนที่ (Mobile Unit)
                </option>
              </select>
            </div>
          </div>

          <!-- Step 2: เลือกวันและเวลา -->
          <div class="form-step" id="step-2">
            <h3
              style="
                margin-bottom: 20px;
                border-bottom: 1px solid #eee;
                padding-bottom: 10px;
              "
            >
              <i class="fa-regular fa-calendar-days" style="color: #ff66a3"></i>
              2. เลือกวันและเวลา
            </h3>

            <div class="input-group">
              <div class="custom-calendar">
                <div class="cal-header">
                  <button type="button" id="pMo" class="cal-nav-btn">
                    <i class="fa-solid fa-chevron-left"></i>
                  </button>
                  <h4 id="mDisp" style="margin: 0; font-weight: 700"></h4>
                  <button type="button" id="nMo" class="cal-nav-btn">
                    <i class="fa-solid fa-chevron-right"></i>
                  </button>
                </div>
                <div class="cal-weekdays">
                  <span style="color: #d93025">อา</span><span>จ</span
                  ><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span
                  ><span style="color: #1a73e8">ส</span>
                </div>
                <div class="cal-days" id="cDays"></div>
              </div>
              <input type="hidden" id="bDate" required />
            </div>

            <div class="input-group" style="margin-bottom: 0">
              <label>ช่วงเวลาที่ให้บริการ</label>
              <div id="tSlots" class="time-grid">
                <div
                  style="
                    grid-column: 1/-1;
                    text-align: center;
                    padding: 20px;
                    background: #f8f9fa;
                    border-radius: 12px;
                    color: #888;
                    font-size: 14px;
                  "
                >
                  <i
                    class="fa-regular fa-hand-pointer"
                    style="
                      font-size: 24px;
                      margin-bottom: 10px;
                      display: block;
                      color: #ccc;
                    "
                  ></i>
                  โปรดเลือกวันที่เพื่อดูคิวว่าง
                </div>
              </div>
              <input type="hidden" id="sTime" required />
            </div>
          </div>

          <!-- Step 3: ข้อมูลผู้ติดต่อ -->
          <div class="form-step" id="step-3">
            <h3
              style="
                margin-bottom: 20px;
                border-bottom: 1px solid #eee;
                padding-bottom: 10px;
              "
            >
              <i class="fa-solid fa-address-card" style="color: #ff66a3"></i> 3.
              ข้อมูลผู้ติดต่อ
            </h3>

            <div class="summary-box">
              <div class="summary-item">
                <i class="fa-solid fa-layer-group"></i>
                <span>บริการ: <strong id="sumService">-</strong></span>
              </div>
              <div class="summary-item">
                <i class="fa-solid fa-user-tie"></i>
                <span>เจ้าหน้าที่: <strong id="sumStaff">-</strong></span>
              </div>
              <div class="summary-item">
                <i class="fa-regular fa-calendar-check"></i>
                <span
                  >วันนัดหมาย: <strong id="sumDate">-</strong> เวลา
                  <strong id="sumTime">-</strong> น.</span
                >
              </div>
              <div class="summary-item">
                <i class="fa-solid fa-location-dot"></i>
                <span>สถานที่: <strong id="sumLoc">-</strong></span>
              </div>
            </div>

            <div class="input-group">
              <label for="fName">ชื่อ-นามสกุล (ตรงตามบัตรประชาชน)</label>
              <input
                type="text"
                id="fName"
                class="form-control"
                placeholder="ระบุชื่อและนามสกุลของคุณ"
                required
                autocomplete="off"
              />
            </div>

            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
            >
              <div class="input-group" style="margin-bottom: 0">
                <label for="tel">เบอร์โทรศัพท์</label>
                <input
                  type="tel"
                  id="tel"
                  class="form-control"
                  placeholder="08X-XXX-XXXX"
                  required
                  autocomplete="off"
                />
              </div>
              <div class="input-group" style="margin-bottom: 0">
                <label for="email">อีเมล (ถ้ามี)</label>
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="example@mail.com"
                  autocomplete="off"
                />
              </div>
            </div>

            <div
              id="bAlert"
              class="alert hidden"
              style="margin-top: 20px"
            ></div>
          </div>

          <!-- ปุ่มควบคุม Wizard -->
          <div class="wizard-buttons">
            <button
              type="button"
              class="btn-prev"
              id="prevBtn"
              style="display: none"
            >
              <i class="fa-solid fa-arrow-left"></i> ย้อนกลับ
            </button>
            <div id="btnSpacer"></div>
            <button type="button" class="btn-next" id="nextBtn">
              ถัดไป <i class="fa-solid fa-arrow-right"></i>
            </button>
            <button
              type="submit"
              class="btn-next"
              id="submitBtn"
              style="
                display: none;
                background: #1e8e3e;
                box-shadow: 0 5px 15px rgba(30, 142, 62, 0.3);
              "
            >
              <i class="fa-solid fa-paper-plane"></i> ยืนยันการจองคิว
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="booking.js"></script>
    <script src="view-toggle.js"></script>
  </body>
</html>
