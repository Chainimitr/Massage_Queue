<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ติดตามสถานะคิว | E-Complaint</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      /* ================= ลูกเล่นหน้าติดตามคิว (Gimmicks) ================= */
      .status-card {
        position: relative;
        overflow: hidden;
        background: #fff;
        padding: 50px 40px;
        border-radius: 24px;
        border: none;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.04);
      }
      
      /* ✅ ปรับ Live Badge ให้ฉลาดขึ้นบนมือถือ */
      .live-badge {
        position: absolute;
        top: 25px;
        right: 25px;
        background: #fff0f0;
        color: #d93025;
        padding: 6px 15px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 2px 10px rgba(217, 48, 37, 0.1);
      }
      .live-dot {
        width: 8px;
        height: 8px;
        background: #d93025;
        border-radius: 50%;
        animation: blink 1s infinite alternate;
      }
      @keyframes blink {
        0% { opacity: 1; transform: scale(1); }
        100% { opacity: 0.4; transform: scale(0.8); }
      }

      /* ✅ Responsive Search Form */
      .search-box-wrapper {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        background: #fff;
        transition: 0.3s ease;
      }
      .search-box-wrapper:focus-within {
        transform: translateY(-3px);
      }
      
      .search-input-group {
        flex: 1;
        margin: 0;
      }
      .search-input {
        border-radius: 12px 0 0 12px;
        border-right: none;
      }
      .search-btn {
        margin: 0;
        border-radius: 0 12px 12px 0;
        padding: 0 30px;
        white-space: nowrap; /* ห้ามปุ่มฉีกคำ */
      }

      /* 🛑 กฎสำคัญ: บังคับการแสดงผลบนมือถือให้สวยงาม 🛑 */
      @media (max-width: 768px) {
        .status-card {
          padding: 30px 20px;
        }
        
        /* ย้ายป้าย Live มาอยู่ตรงกลางด้านบนแทน เพื่อไม่ให้เบียดหัวข้อ */
        .live-badge {
          position: relative;
          top: 0;
          right: 0;
          margin: 0 auto 15px auto;
          width: max-content;
          justify-content: center;
        }

        /* จับช่องค้นหาและปุ่มแยกบรรทัดกัน */
        .search-box-wrapper {
          flex-direction: column;
          gap: 10px;
        }
        
        /* ปรับขอบโค้งให้สวยงามเมื่ออยู่แยกบรรทัด */
        .search-input {
          border-radius: 12px !important;
          border-right: 1.5px solid #e1e5eb !important;
          text-align: center;
        }
        
        .search-btn {
          border-radius: 12px !important;
          width: 100%;
          padding: 15px 30px !important;
        }
      }

      #sRes {
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(30px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .highlight-number {
        text-shadow: 0 0 20px rgba(255, 102, 163, 0.3);
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }

      .tracker-line {
        width: 100%;
        height: 8px;
        background: #f0f4f8;
        border-radius: 10px;
        margin: 30px 0;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
      }
      .tracker-progress {
        height: 100%;
        background: linear-gradient(90deg, #ffb3d1, #ff66a3);
        border-radius: 10px;
        width: 0%;
        transition: width 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        position: relative;
      }
      .tracker-progress::after {
        content: "";
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0) 100%);
        animation: shimmer 2s infinite;
      }
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }

      .status-box, .wait-time-container { transition: 0.3s; }
      .status-box:hover, .wait-time-container:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04); }
      
      .wait-row { display: flex; align-items: center; gap: 15px; }
      .wait-info { flex: 1; text-align: left; }
      .wait-info span { font-size: 13px; color: #666; }
      .wait-info h3 { margin-top: 5px; font-size: 20px; }
    </style>
  </head>
  <body class="page-body">
    <nav class="navbar">
      <div class="logo">
        <i class="fa-solid fa-satellite-dish"></i> E-Tracker
      </div>
      <button onclick="location.href = 'home.html'" class="logout-btn">
        <i class="fa-solid fa-arrow-left"></i> กลับหน้าหลัก
      </button>
    </nav>

    <div class="booking-wrapper">
      <div class="status-card">
        
        <!-- ✅ ป้าย Live Badge -->
        <div class="live-badge">
          <div class="live-dot"></div>
          LIVE TRACKING
        </div>

        <div class="text-center" style="margin-bottom: 30px">
          <h2 style="color: #1a1a1a; font-size: 28px; margin-bottom: 5px; word-break: keep-all;">
            ติดตามสถานะคิว
          </h2>
          <p class="subtitle" style="margin-bottom: 0">
            กรอกหมายเลขคิวของคุณเพื่อประเมินเวลารอแบบเรียลไทม์
          </p>
        </div>

        <!-- ✅ ระบบฟอร์มค้นหาคิวใหม่ (Responsive 100%) -->
        <form id="sForm" class="search-box-wrapper">
          <div class="input-group search-input-group">
            <input
              type="text"
              id="sInp"
              class="form-control search-input"
              placeholder="ระบุหมายเลขคิว เช่น Q-1234"
              required
              autocomplete="off"
            />
          </div>
          <button type="submit" class="primary-btn search-btn">
            <i class="fa-solid fa-magnifying-glass"></i> ค้นหาคิว
          </button>
        </form>

        <div id="sAlert" class="alert hidden"></div>

        <div id="sRes" style="display: none">
          <div class="dashboard-grid">
            <div class="status-box highlight">
              <p class="box-title" style="color: #e64d8a; font-weight: 600">
                <i class="fa-solid fa-bullhorn"></i> คิวที่กำลังเรียกขณะนี้
              </p>
              <h1 id="rCur" class="big-number highlight-number">Q-XXX</h1>
            </div>
            <div class="status-box">
              <p class="box-title" style="font-weight: 600">
                <i class="fa-solid fa-ticket"></i> หมายเลขคิวของคุณ
              </p>
              <h1 id="rMy" class="big-number" style="color: #333">Q-XXX</h1>
            </div>
          </div>

          <div style="text-align: right; font-size: 12px; color: #888; margin-top: 10px; font-weight: 600;" id="rStatusText">
            กำลังคำนวณระยะห่าง...
          </div>
          
          <div class="tracker-line">
            <div class="tracker-progress" id="rProgress"></div>
          </div>

          <div class="wait-time-container">
            <div class="wait-row">
              <div class="wait-icon"><i class="fa-solid fa-users"></i></div>
              <div class="wait-info">
                <span>จำนวนคิวที่รออยู่หน้าคุณ</span>
                <h3 id="rAh" style="color: #1a1a1a">0 คิว</h3>
              </div>
            </div>
            <div class="wait-row" style="margin-top: 20px">
              <div class="wait-icon" style="background: #e8f0fe; color: #1a73e8">
                <i class="fa-solid fa-hourglass-half"></i>
              </div>
              <div class="wait-info">
                <span>เวลาประมาณการที่ต้องรอ</span>
                <h3 id="rTime" style="color: #1a73e8">0 นาที</h3>
              </div>
            </div>
          </div>

          <div class="ticket-details" style="margin-top: 25px; border-top: 2px dashed #f0f4f8; padding-top: 25px; border-radius: 0; background: transparent; padding-bottom: 0; margin-left: 0; margin-right: 0;">
            <div class="detail-row">
              <span><i class="fa-solid fa-layer-group" style="color: #ccc"></i> บริการที่เลือก:</span>
              <strong id="r-service"></strong>
            </div>
            <div class="detail-row">
              <span><i class="fa-regular fa-calendar" style="color: #ccc"></i> วันที่นัดหมาย:</span>
              <strong id="r-date"></strong>
            </div>
            <div class="detail-row" style="margin-bottom: 0; border: none">
              <span><i class="fa-regular fa-clock" style="color: #ccc"></i> เวลาที่จอง:</span>
              <strong id="r-time"></strong>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="status.js"></script>
    <script src="view-toggle.js"></script>
  </body>
</html>
