<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management | E-Complaint</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .admin-card {
        animation: fadeSlideUp 0.5s ease backwards;
      }
      @keyframes fadeSlideUp {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .data-table tbody tr {
        transition: all 0.2s ease;
      }
      .data-table tbody tr:hover {
        background-color: #fff !important;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        transform: scale(1.01);
        z-index: 10;
        position: relative;
      }

      .search-container {
        position: relative;
        width: 100%;
        max-width: 350px;
      }
      .search-container i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #888;
      }
      .search-container input {
        padding-left: 45px;
        border-radius: 30px;
        border-color: #e1e5eb;
      }
    </style>
  </head>
  <body class="page-body">
    <nav class="navbar">
      <div class="logo">
        <i class="fa-solid fa-users-gear"></i> User <span>Management</span>
      </div>
      <div class="nav-menu">
        <button onclick="location.href = 'admin.html'" class="logout-btn">
          <i class="fa-solid fa-arrow-left"></i> กลับไป Dashboard
        </button>
      </div>
    </nav>

    <div class="admin-container">
      <div class="admin-card">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
          "
        >
          <h3 style="margin: 0; color: #1a1a1a">
            <i class="fa-solid fa-users" style="color: #ff66a3"></i>
            รายชื่อผู้ใช้งานทั้งหมด
          </h3>
          <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="text"
              id="searchInput"
              class="form-control"
              placeholder="พิมพ์ชื่อผู้ใช้เพื่อค้นหา..."
            />
          </div>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>ชื่อผู้ใช้งาน (Username)</th>
              <th>ประวัติการจอง</th>
              <th>สถานะบัญชี</th>
              <th style="text-align: right">เครื่องมือจัดการ</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr>
              <td
                colspan="4"
                class="text-center"
                style="padding: 30px; color: #888"
              >
                <i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal เปลี่ยนรหัสผ่าน -->
    <div id="pwdModal" class="modal hidden">
      <div class="modal-content">
        <h3 style="color: #1a1a1a; margin-bottom: 10px">
          <i class="fa-solid fa-key" style="color: #ff66a3"></i> เปลี่ยนรหัสผ่าน
        </h3>
        <p style="color: #888; font-size: 14px; margin-bottom: 20px">
          กำลังเปลี่ยนรหัสผ่านให้กับผู้ใช้:
          <strong id="pwdTargetUser" style="color: #1a73e8"></strong>
        </p>
        <form id="pwdForm">
          <input type="hidden" id="pwdUsername" />
          <div class="input-group">
            <label>รหัสผ่านใหม่</label>
            <input
              type="text"
              id="newPwd"
              placeholder="กรอกรหัสผ่านใหม่ที่ต้องการ"
              class="form-control"
              required
              autocomplete="off"
            />
          </div>
          <button type="submit" class="primary-btn w-100" style="padding: 15px">
            <i class="fa-solid fa-save"></i> บันทึกรหัสผ่าน
          </button>
        </form>
        <button
          onclick="document.getElementById('pwdModal').classList.add('hidden')"
          class="logout-btn w-100 mt-20"
        >
          ยกเลิก
        </button>
      </div>
    </div>

    <!-- Modal ดูประวัติ -->
    <div id="hModal" class="modal hidden">
      <div
        class="modal-content"
        style="max-width: 600px; max-height: 80vh; overflow-y: auto"
      >
        <h3 id="hTitle" style="color: #ff66a3; margin-bottom: 20px">
          <i class="fa-solid fa-clock-rotate-left"></i> ประวัติการจอง
        </h3>
        <table class="data-table">
          <thead>
            <tr>
              <th>วันที่ / เวลา</th>
              <th>หมายเลขคิว</th>
              <th>บริการ</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="hTb"></tbody>
        </table>
        <button
          onclick="document.getElementById('hModal').classList.add('hidden')"
          class="primary-btn w-100 mt-20"
        >
          ปิดหน้าต่าง
        </button>
      </div>
    </div>

    <script src="users.js"></script>
  </body>
</html>
