<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>คิวของฉัน | E-Complaint</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      /* ================= ลูกเล่นหน้าคิวของฉัน (Gimmicks) ================= */

      /* หน้าจอตอนที่ยังไม่มีคิว (Empty State) */
      .empty-state-card {
        background: #fff;
        padding: 60px 30px;
        border-radius: 24px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.03);
        border: 1px dashed #ffb3d1;
        animation: fadeInUp 0.6s ease;
      }

      .empty-icon {
        font-size: 70px;
        color: #ffe6f0;
        margin-bottom: 20px;
        /* แอนิเมชันไอคอนลอยขึ้นลง */
        animation: floatIcon 3s ease-in-out infinite;
        text-shadow: 0 10px 20px rgba(255, 102, 163, 0.2);
      }

      @keyframes floatIcon {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      /* การ์ดแสดงคิว (Ticket Cards) */
      .my-booking-card {
        background: #fff;
        border-radius: 16px;
        padding: 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
        border: 1px solid #f0f4f8;
        border-left: 6px solid #ff66a3; /* แถบสีเริ่มต้น */
        position: relative;
        overflow: hidden;

        /* แอนิเมชันตอนโหลดการ์ดขึ้นมา */
        animation: slideUpFade 0.5s ease backwards;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      .my-booking-card:hover {
        transform: translateY(-5px) scale(1.01);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
      }

      @keyframes slideUpFade {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ตกแต่งสถานะสีสันต่างๆ */
      .status-badge {
        padding: 6px 15px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
      }

      /* สีสำหรับสถานะต่างๆ (JS จะเป็นตัวใส่ Class ให้) */
      .card-wait {
        border-left-color: #fbbc04;
      }
      .badge-wait {
        background-color: #fff8e1;
        color: #f29900;
      }

      .card-serve {
        border-left-color: #4285f4;
      }
      .badge-serve {
        background-color: #e8f0fe;
        color: #1a73e8;
      }

      .card-done {
        border-left-color: #34a853;
      }
      .badge-done {
        background-color: #e6f4ea;
        color: #1e8e3e;
      }

      /* ปุ่ม Action ดูตั๋ว / ยกเลิก */
      .btn-view-ticket {
        background: #ffe6f0;
        color: #ff66a3;
        border: 1px solid #ffb3d1;
      }
      .btn-view-ticket:hover {
        background: #ff66a3;
        color: white;
      }

      @media (max-width: 600px) {
        .my-booking-card {
          flex-direction: column;
          align-items: flex-start;
          gap: 15px;
        }
        .booking-actions {
          width: 100%;
          display: flex;
          gap: 10px;
        }
        .action-btn {
          flex: 1;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body class="page-body">
    <nav class="navbar">
      <div class="logo">
        <i class="fa-solid fa-list-check"></i> E-Complaint <span>MyQueue</span>
      </div>
      <div class="nav-menu">
        <button onclick="window.location.href = 'home.html'" class="logout-btn">
          <i class="fa-solid fa-arrow-left"></i> กลับหน้าหลัก
        </button>
      </div>
    </nav>

    <div
      class="booking-wrapper"
      style="
        flex-direction: column;
        align-items: center;
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
      "
    >
      <div
        class="page-header"
        style="
          text-align: center;
          margin-bottom: 30px;
          animation: slideUpFade 0.4s ease;
        "
      >
        <h2 style="color: #1a1a1a; font-size: 28px">กระเป๋าตั๋วคิวของฉัน</h2>
        <p style="color: #888">รวบรวมรายการนัดหมายและคำร้องของคุณทั้งหมด</p>
      </div>

      <!-- กล่องแสดงเมื่อไม่มีคิว -->
      <div
        id="noBookingMessage"
        class="empty-state-card hidden"
        style="width: 100%; max-width: 500px; margin: 0 auto"
      >
        <div class="empty-icon"><i class="fa-solid fa-ticket"></i></div>
        <h3 style="color: #333; margin-bottom: 10px">
          ยังไม่มีตั๋วคิวในกระเป๋า
        </h3>
        <p style="color: #888; font-size: 14px; margin-bottom: 25px">
          คุณสามารถทำการยื่นคำร้องหรือจองคิวรับบริการได้ทันที
        </p>
        <button
          onclick="window.location.href = 'booking.html'"
          class="primary-btn"
        >
          <i class="fa-solid fa-calendar-plus"></i> ไปหน้าจองคิว
        </button>
      </div>

      <!-- กล่องที่จะให้ JS เอาตั๋วคิวมาใส่ -->
      <div id="bookingList" class="my-bookings-container" style="width: 100%">
        <div style="text-align: center; color: #ff66a3; padding: 40px">
          <i
            class="fa-solid fa-spinner fa-spin"
            style="font-size: 30px; margin-bottom: 10px"
          ></i>
          <p>กำลังโหลดข้อมูล...</p>
        </div>
      </div>
    </div>

    <!-- เชื่อมโยงสคริปต์ต่างๆ -->
    <script src="my-bookings.js"></script>
    <script src="view-toggle.js"></script>
  </body>
</html>
